

########################################
## Snakemake Parameters
########################################


##########
## General Parameters
##########

local-cores: 1
keep-going: True
rerun-incomplete: True
printshellcmds: True
#quiet: True
rerun-triggers: mtime


##########
## Environment Parameters
##########

use-conda: True
conda-frontend: 'mamba'
conda-prefix: 'mini_bac_pipeline/workflow/installed_envs/conda'

use-singularity: True
singularity-prefix: 'mini_bac_pipeline/workflow/installed_envs/singularity'

##########
## Config File Parameters
##########

configfile: 'config.yml' # standard config file 
